<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>bakumote STUDIO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body ontouchstart="">
  
  <header class="app-header">
    <div class="brand">
      <div class="brand-icon">B</div>
      <div class="brand-text">
        <h1 class="brand-title">bakumote STUDIO</h1>
        <div class="brand-subtitle">VIDEO EDITOR</div>
      </div>
    </div>
    <button class="icon-btn" onclick="toggleConfigCard()" title="Settings">&#9881;</button>
  </header>

  <div id="alert-banner" style="display: none;"></div>

  <div id="config-card" class="config-card hidden">
    <h3>Configuration</h3>
    <label for="input-gas-url">GAS Web App URL:</label>
    <input type="text" id="input-gas-url" value="https://script.google.com/macros/s/AKfycbzppl0o5kMi7-4yjtwlCPGdVucFpgDaq3l48ihgTaaQ9cyDeSQr37JGSeK5BkzCDE4L/exec">
    <div class="card-actions">
      <button onclick="saveConfig()">Save & Test</button>
      <button onclick="toggleConfigCard()">Close</button>
    </div>
  </div>

  <section id="preview-container" class="preview-container">
    <div id="preview-empty">
      <span class="emoji">&#127902;</span> JSONを読み込むとプレビュー表示
    </div>
    <img id="preview-image" src="" alt="Scene Preview" style="display: none;">
    <div id="preview-overlay" style="display: none;"></div>
    <div id="preview-scene-num" style="display: none;"></div>
    <div id="preview-duration" style="display: none;"></div>
    <div id="preview-nav" style="display: none;">
      <button class="nav-btn" onclick="navigateScene(-1)">&#9664;</button>
      <button class="nav-btn" onclick="navigateScene(1)">&#9654;</button>
    </div>
  </section>

  <section id="timeline-section" class="timeline-section" style="display: none;">
    <div class="timeline-header">
      <span class="timeline-label">TIMELINE</span>
      <span id="timeline-total" class="timeline-total">0.0s</span>
    </div>
    <div id="timeline-scroll" class="timeline-scroll"></div>
  </section>

  <section id="tool-tabs" class="tool-tabs" style="display: none;">
    <div class="tool-tabs-container">
      <button class="tab-btn active" onclick="switchToolTab('panel-script', this)">
        <span class="tab-icon">&#9999;</span> Script
      </button>
      <button class="tab-btn" onclick="switchToolTab('panel-media', this)">
        <span class="tab-icon">&#128247;</span> Media
      </button>
      <button class="tab-btn" onclick="switchToolTab('panel-timing', this)">
        <span class="tab-icon">&#128338;</span> Timing
      </button>
      <button class="tab-btn" onclick="switchToolTab('panel-status', this)">
        <span class="tab-icon">&#128640;</span> Export
      </button>
    </div>
  </section>

  <section id="editor-panels">
    <div id="panel-script" class="editor-panel active">
      <div id="script-editor-list"></div>
    </div>
    
    <div id="panel-media" class="editor-panel">
      <div class="media-grid" id="media-slot-grid">
        <p class="placeholder-text">Media slots will appear here after parsing JSON.</p>
      </div>
    </div>
    
    <div id="panel-timing" class="editor-panel">
      <div id="timing-editor-list"></div>
    </div>
    
    <div id="panel-status" class="editor-panel">
      <div class="status-card">
        <div id="status-badge" class="status-badge">UNKNOWN</div>
        <h3 id="status-title">Status Check</h3>
        <p id="status-meta">No actions currently running.</p>
        <button class="primary-btn" onclick="checkActionsStatus(true)">Check Status</button>
        <div id="artifact-list-area"></div>
      </div>
    </div>
  </section>

  <div id="modal-json" class="modal-overlay" style="display: none;">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3>Load JSON</h3>
      <div class="modal-actions-top">
        <button onclick="pasteFromClipboard()">&#128464; Paste</button>
        <button onclick="document.getElementById('file-upload-json').click()">&#128193; File</button>
        <input type="file" id="file-upload-json" accept=".json" style="display: none;" onchange="handleFileUpload(event)">
      </div>
      <textarea id="textarea-json-raw" placeholder="Paste JSON here..."></textarea>
      
      <div class="input-group">
        <label for="meta-json-filename">JSON Filename:</label>
        <input type="text" id="meta-json-filename" value="video_config_custom.json">
      </div>
      
      <div class="input-group">
        <label for="meta-output-filename">MP4 Filename:</label>
        <input type="text" id="meta-output-filename" value="output_custom.mp4">
      </div>
      
      <div class="modal-actions-bottom">
        <button id="btn-parse-json" class="primary-btn" onclick="parseAndRenderJson()">Parse & Render</button>
        <button class="secondary-btn" onclick="closeModal('modal-json')">Cancel</button>
      </div>
    </div>
  </div>

  <nav class="bottom-bar">
    <button class="bottom-btn" onclick="openModal('modal-json')">
      <span class="btn-icon">&#128196;</span>
      <span class="btn-label">JSON</span>
    </button>
    <button id="btn-push-trigger" class="bottom-btn generate-btn" onclick="pushAndTriggerWorkflow()">
      <span class="btn-icon">&#127909;</span>
      <span class="btn-label">Generate</span>
    </button>
    <button class="bottom-btn" onclick="switchToolTab('panel-status', null); checkActionsStatus(true)">
      <span class="btn-icon">&#128225;</span>
      <span class="btn-label">Monitor</span>
    </button>
  </nav>

  <input type="hidden" id="meta-title" value="">
  <div id="toast" style="display: none;"></div>

  <script src="app.js"></script>
</body>
</html>
