<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>bakumote STUDIO</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

:root {
  --bg-app: #f4f6f9;
  --bg-sheet: #ffffff;
  --bg-element: #f8fafc;
  --text-main: #1e293b;
  --text-muted: #64748b;
  --text-light: #94a3b8;
  --accent: #10b981;
  --accent-hover: #0d9488;
  --accent-soft: rgba(16, 185, 129, 0.08);
  --accent-glow: rgba(16, 185, 129, 0.2);
  --system-blue: #007aff;
  
  --border: #e2e8f0;
  --border-focus: #10b981;
  
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.03), 0 2px 4px rgba(0, 0, 0, 0.02);
  --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.05), 0 3px 10px rgba(0, 0, 0, 0.02);
  
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  
  --transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Noto Sans JP", sans-serif;
  background-color: var(--bg-app);
  color: var(--text-main);
  line-height: 1.4;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(75px + var(--safe-bottom));
}

/* ===== APP HEADER ===== */
.app-header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-icon {
  width: 34px;
  height: 34px;
  background: var(--text-main);
  color: #fff;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 16px;
}

.brand-text {
  display: flex;
  flex-direction: column;
}

.brand-title {
  font-size: 15px;
  font-weight: 800;
  color: var(--text-main);
  letter-spacing: -0.3px;
  margin: 0;
}

.brand-subtitle {
  font-size: 9px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

.icon-btn {
  background: var(--bg-element);
  border: 1px solid var(--border);
  font-size: 16px;
  color: var(--text-muted);
  cursor: pointer;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: var(--transition);
}

.icon-btn:active {
  background-color: var(--border);
  transform: scale(0.92);
}

/* ===== CONFIG CARD ===== */
.config-card {
  background: var(--bg-sheet);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 18px;
  margin: 12px;
  box-shadow: var(--shadow-md);
  animation: slideDown 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.config-card.hidden {
  display: none;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.config-card h3 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
}

.config-card label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.config-card input {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 12px;
  background-color: var(--bg-element);
  color: var(--text-main);
  outline: none;
}

.config-card input:focus {
  border-color: var(--accent);
}

.card-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.card-actions button {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
}

.card-actions button:first-child {
  background: var(--accent);
  color: #fff;
}

.card-actions button:last-child {
  background: var(--border);
  color: var(--text-main);
}

/* ===== PREVIEW CONTAINER ===== */
.preview-container {
  position: relative;
  width: 100%;
  aspect-ratio: 9/16;
  max-height: 42vh;
  background-color: #0d0e12;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
}

#preview-empty {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #ffffff;
  font-size: 13px;
  font-weight: 700;
  gap: 10px;
  padding: 24px;
  text-align: center;
}

#preview-empty .emoji {
  font-size: 40px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}

.preview-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: filter 0.3s;
}

/* 単純な黒グラデ背景ではなく、下部に文字が浮くシネマティックスタイル */
#preview-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 40px 20px 24px;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.4) 60%, transparent 100%);
  color: #ffffff;
  text-align: center;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10;
}

.preview-title {
  font-size: 17px;
  font-weight: 800;
  line-height: 1.4;
  color: #ffffff;
  text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
  word-break: break-all;
}

.preview-subtitle {
  font-size: 12px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.75);
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
  word-break: break-all;
}

#preview-scene-num {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #fff;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  border: 0.5px solid rgba(255,255,255,0.15);
  z-index: 15;
}

#preview-duration {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #fff;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  border: 0.5px solid rgba(255,255,255,0.15);
  z-index: 15;
}

#preview-nav {
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 12px;
  transform: translateY(-50%);
  pointer-events: none;
  z-index: 20;
}

.nav-btn {
  pointer-events: all;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: none;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  color: var(--text-main);
  font-size: 12px;
  transition: var(--transition);
}

.nav-btn:active {
  transform: scale(0.85);
  background: #ffffff;
}

/* ===== TIMELINE SECTION ===== */
.timeline-section {
  background-color: var(--bg-sheet);
  border-bottom: 1px solid var(--border);
  padding: 12px 0 16px;
  box-shadow: var(--shadow-sm);
}

.timeline-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 18px 8px;
  font-size: 11px;
  font-weight: 800;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

.timeline-total {
  color: var(--accent);
  background-color: var(--accent-soft);
  padding: 2px 8px;
  border-radius: 20px;
}

.timeline-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 18px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}

.timeline-scroll::-webkit-scrollbar {
  display: none;
}

.timeline-card {
  flex-shrink: 0;
  width: 68px;
  height: 68px;
  border-radius: var(--radius-sm);
  background-color: var(--bg-element);
  border: 2px solid transparent;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
}

.timeline-card.active {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px var(--accent-glow);
}

.timeline-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.timeline-label-num {
  position: absolute;
  bottom: 4px;
  left: 4px;
  background: rgba(0, 0, 0, 0.7);
  color: #fff;
  border-radius: 4px;
  font-size: 8px;
  padding: 2px 5px;
  font-weight: 700;
  border: 0.5px solid rgba(255,255,255,0.1);
}

.timeline-card-empty {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--text-light);
  background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
}

/* ===== TABS (Segmented Control style) ===== */
.tool-tabs {
  background: var(--bg-sheet);
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
}

.tool-tabs-container {
  display: flex;
  background-color: #f1f5f9;
  border-radius: var(--radius-sm);
  padding: 3px;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
}

.tab-btn {
  flex: 1;
  background: none;
  border: none;
  padding: 8px 0;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: var(--transition);
}

.tab-btn:active {
  transform: scale(0.96);
}

.tab-btn.active {
  background-color: var(--bg-sheet);
  color: var(--text-main);
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
}

.tab-icon {
  font-size: 14px;
}

/* ===== EDITOR PANELS ===== */
.editor-panel {
  display: none;
  padding: 16px 18px;
  max-width: 600px;
  margin: 0 auto;
  animation: fadeIn 0.25s ease-out;
}

.editor-panel.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- Script Editor Card --- */
.script-editor-card {
  background-color: var(--bg-sheet);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}

.script-editor-card.selected {
  border-color: var(--accent);
  box-shadow: 0 6px 20px var(--accent-soft), var(--shadow-md);
  transform: translateY(-1px);
}

.script-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.scene-num-badge {
  font-size: 10px;
  font-weight: 800;
  background-color: var(--accent-soft);
  color: var(--accent);
  padding: 3px 10px;
  border-radius: 20px;
}

.scene-type-badge {
  font-size: 9px;
  font-weight: 800;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* --- Form Groups & Input Controls --- */
.input-group {
  margin-bottom: 12px;
}

.input-group label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.input-group input, .input-group textarea {
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  font-size: 13px;
  background-color: var(--bg-element);
  font-family: inherit;
  color: var(--text-main);
  transition: var(--transition);
  outline: none;
}

.input-group textarea {
  min-height: 60px;
  resize: vertical;
}

.input-group input:focus, .input-group textarea:focus {
  border-color: var(--accent);
  background-color: var(--bg-sheet);
  box-shadow: 0 0 0 4px var(--accent-soft);
}

/* --- Media Slots (素材選択の完全なボタン隠蔽とおしゃれ化) --- */
.media-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.media-slot-item {
  background: var(--bg-sheet);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
}

.media-slot-view {
  aspect-ratio: 16/9;
  background-color: var(--bg-element);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: pointer;
  gap: 6px;
  transition: var(--transition);
  border-bottom: 1px solid var(--border);
  padding: 10px;
}

.media-slot-view:active {
  background-color: var(--border);
}

.media-slot-view img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 5;
}

.media-slot-placeholder-text {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-light);
}

.media-slot-view .icon-camera {
  font-size: 24px;
  color: var(--text-light);
}

.media-slot-checked {
  position: absolute;
  top: 8px;
  right: 8px;
  background-color: var(--accent);
  color: #fff;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  box-shadow: var(--shadow-sm);
  z-index: 10;
  border: 1.5px solid #fff;
}

.media-slot-details {
  padding: 10px 12px;
}

.media-slot-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-main);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.media-slot-scenes-list {
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 2px;
  background-color: var(--bg-element);
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 600;
}

.placeholder-text {
  grid-column: 1/-1;
  text-align: center;
  padding: 48px 24px;
  color: var(--text-light);
  font-size: 13px;
}

/* --- Timing Panel (尺設定) --- */
.timing-item-card {
  background: var(--bg-sheet);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.timing-item-card.total {
  border-color: var(--accent);
  background-color: var(--accent-soft);
  box-shadow: 0 4px 14px var(--accent-glow);
}

.timing-name {
  font-size: 13px;
  font-weight: 700;
}

.timing-name span {
  font-size: 10px;
  color: var(--text-muted);
  display: block;
  font-weight: 500;
  margin-top: 2px;
}

.timing-sec {
  font-size: 14px;
  font-weight: 800;
  color: var(--text-main);
}

.timing-item-card.total .timing-sec {
  color: var(--accent);
  font-size: 17px;
}

/* ===== STATUS CARD ===== */
.status-card {
  background-color: var(--bg-sheet);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px 20px;
  text-align: center;
  box-shadow: var(--shadow-md);
}

.status-badge {
  display: inline-block;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 800;
  margin-bottom: 12px;
  border: 1px solid transparent;
}

.status-badge.progress {
  background-color: rgba(245, 158, 11, 0.08);
  color: var(--warning);
  border-color: rgba(245, 158, 11, 0.2);
  animation: pulseAnim 1.5s infinite;
}

.status-badge.success {
  background-color: var(--accent-soft);
  color: var(--accent);
  border-color: rgba(16, 185, 129, 0.2);
}

.status-badge.error {
  background-color: rgba(255, 59, 48, 0.08);
  color: var(--danger);
  border-color: rgba(255, 59, 48, 0.2);
}

.status-card h3 {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 6px;
}

.status-card p {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

@keyframes pulseAnim {
  0% { opacity: 1; }
  50% { opacity: 0.6; }
  100% { opacity: 1; }
}

/* ===== BUTTONS ===== */
button, .btn {
  font-family: inherit;
  transition: var(--transition);
  outline: none;
}

button:active {
  transform: scale(0.95);
}

.primary-btn {
  background-color: var(--accent);
  color: #fff;
  border: none;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 12px var(--accent-glow);
}

.primary-btn:active {
  background-color: var(--accent-hover);
}

.secondary-btn {
  background-color: #f1f5f9;
  color: var(--text-main);
  border: none;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}

.secondary-btn:active {
  background-color: var(--border);
}

/* ===== TOAST ===== */
#toast {
  position: fixed;
  bottom: calc(85px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background-color: rgba(30, 41, 59, 0.95);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #fff;
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 12px;
  font-weight: 700;
  z-index: 1000;
  transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.15);
  box-shadow: var(--shadow-lg);
  white-space: nowrap;
}

#toast.show {
  transform: translateX(-50%) translateY(0);
}

/* ===== MODAL & BOTTOM SHEET (Apple HIG style) ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background-color: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 300;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  transition: opacity 0.3s;
}

.modal-sheet {
  width: 100%;
  max-width: 600px;
  background-color: var(--bg-sheet);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 16px 20px calc(24px + var(--safe-bottom));
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.35s cubic-bezier(0.15, 0.85, 0.3, 1);
  max-height: 85vh;
  overflow-y: auto;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-handle {
  width: 36px;
  height: 5px;
  background-color: var(--border);
  border-radius: 3px;
  margin: 0 auto 18px;
}

.modal-sheet h3 {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 14px;
  letter-spacing: -0.3px;
}

.modal-actions-top {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}

.modal-actions-top button {
  flex: 1;
  padding: 10px 0;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg-element);
  font-weight: 700;
  font-size: 13px;

/* ===== FIXED BOTTOM BAR ===== */

.bottom-btn {

  <input type="hidden" id="meta-title" value="">
  <div id="toast" style="display: none;"></div>

  <script>
/**
 * bakumote STUDIO - Fully Redesigned Clean Editor Logic
 * GAS sandbox safe: NO backticks (`), NO template literals, NO arrow functions in code
 */

window.addEventListener("error", function(e) {
  console.error("Global Error:", e.error || e.message);
  showAlertBanner("Error: " + (e.message || ""), "error");
});

var state = {
  gasUrl: localStorage.getItem("bakumote_gas_url") || "https://script.google.com/macros/s/AKfycbzppl0o5kMi7-4yjtwlCPGdVucFpgDaq3l48ihgTaaQ9cyDeSQr37JGSeK5BkzCDE4L/exec",
  configData: null,
  imageSlots: new Map(),
  pollingInterval: null,
  selectedSceneIndex: 0,
  sceneCount: 0
};

document.addEventListener("DOMContentLoaded", function() {
  var gasInput = document.getElementById("input-gas-url");
  if (gasInput && state.gasUrl) gasInput.value = state.gasUrl;
});

/* ===== UTILITIES ===== */

function showAlertBanner(msg, type) {
  var banner = document.getElementById("alert-banner");
  if (!banner) return;
  banner.style.display = "block";
  if (type === "error") {
    banner.style.backgroundColor = "#fee2e2"; banner.style.color = "#ef4444"; banner.style.border = "1px solid rgba(239,68,68,0.2)";
  } else if (type === "success") {
    banner.style.backgroundColor = "#ecfdf5"; banner.style.color = "#10b981"; banner.style.border = "1px solid rgba(16,185,129,0.2)";
  } else {
    banner.style.backgroundColor = "#eff6ff"; banner.style.color = "#3b82f6"; banner.style.border = "1px solid rgba(59,130,246,0.2)";
  }
  banner.innerHTML = msg;
}

function showToast(msg) {
  var toast = document.getElementById("toast");
  if (!toast) return;
  toast.textContent = msg;
  toast.style.display = "block";
  toast.classList.add("show");
  setTimeout(function() {
    toast.classList.remove("show");
    setTimeout(function() { toast.style.display = "none"; }, 350);
  }, 2300);
}

function escapeHtml(str) {
  if (typeof str !== "string") return "";
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* ===== MODAL & CONFIG ===== */

window.openModal = function(id) {
  var modal = document.getElementById(id);
  if (modal) {
    modal.style.display = "flex";
  }
};

window.closeModal = function(id) {
  var modal = document.getElementById(id);
  if (modal) {
    modal.style.display = "none";
  }
};

window.toggleConfigCard = function() {
  var card = document.getElementById("config-card");
  if (card) {
    card.classList.toggle("hidden");
  }
};

window.saveConfig = async function() {
  var urlInput = document.getElementById("input-gas-url");
  var url = urlInput ? urlInput.value.trim() : "";
  if (!url) { showAlertBanner("URL cannot be empty.", "error"); return; }
  localStorage.setItem("bakumote_gas_url", url);
  state.gasUrl = url;
  showAlertBanner("Testing backend connection...", "info");
  try {
    var res = await fetch(url + "?action=test");
    var data = await res.json();
    if (data.status === "ok") {
      showAlertBanner("Backend connected successfully!", "success");
      setTimeout(function() { toggleConfigCard(); }, 1200);
    } else {
      showAlertBanner("Verification failed. Invalid response from GAS.", "error");
    }
  } catch (err) {
    showAlertBanner("Backend connection error. Please verify the URL.", "error");
  }
};

/* ===== TABS ===== */

window.switchToolTab = function(panelId, btnElem) {
  var tabs = document.querySelectorAll(".tab-btn");
  var panels = document.querySelectorAll(".editor-panel");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  for (var j = 0; j < panels.length; j++) panels[j].classList.remove("active");
  
  if (btnElem) {
    btnElem.classList.add("active");
  } else {
    for (var k = 0; k < tabs.length; k++) {
      if (tabs[k].getAttribute("onclick").indexOf(panelId) !== -1) {
        tabs[k].classList.add("active");
        break;
      }
    }
  }
  var panel = document.getElementById(panelId);
  if (panel) panel.classList.add("active");
};

/* ===== FILE INPUTS & CLIPBOARD ===== */

window.pasteFromClipboard = async function() {
  try {
    var text = await navigator.clipboard.readText();
    if (text) {
      var ta = document.getElementById("textarea-json-raw");
      if (ta) ta.value = text;
      showAlertBanner("JSON pasted successfully! Parsing...", "info");
      setTimeout(window.parseAndRenderJson, 300);
    } else {
      showAlertBanner("Clipboard is empty.", "error");
    }
  } catch (err) {
    showAlertBanner("Security block: Please tap the textarea and paste the JSON manually.", "error");
  }
};

window.handleFileUpload = function(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var ta = document.getElementById("textarea-json-raw");
    if (ta) ta.value = e.target.result;
    showAlertBanner("JSON file loaded! Parsing...", "info");
    setTimeout(window.parseAndRenderJson, 300);
  };
  reader.readAsText(file);
};

// HTML-defined file upload compatibility mapping
window.handleFileUploadFallback = function(event) {
  window.handleFileUpload(event);
};

/* ===== JSON PARSE AND DECORATOR ===== */

window.parseAndRenderJson = function() {
  var btn = document.getElementById("btn-parse-json");
  if (btn) btn.textContent = "Processing...";

  var textarea = document.getElementById("textarea-json-raw");
  var rawText = textarea ? textarea.value.trim() : "";

  if (!rawText) {
    if (btn) btn.textContent = "Parse & Render";
    showAlertBanner("Please input JSON data first.", "error");
    return;
  }

  try {
    rawText = rawText.replace(/```[a-zA-Z]*\n?/g, "").replace(/```/g, "");
    var cleanText = rawText
      .replace(/[\u201c\u201d]/g, '"')
      .replace(/[\u2018\u2019]/g, "'")
      .replace(/\uff1a/g, ':')
      .replace(/\uff0c/g, ',');

    var firstBrace = cleanText.indexOf('{');
    var lastBrace = cleanText.lastIndexOf('}');
    if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
      cleanText = cleanText.substring(firstBrace, lastBrace + 1);
    }
    cleanText = cleanText.replace(/,\s*([}\]])/g, "$1");

    var data = JSON.parse(cleanText);
    state.configData = data;
    state.sceneCount = (data.scenes || []).length;
    state.selectedSceneIndex = 0;

    var metaTitle = document.getElementById("meta-title");
    if (metaTitle) metaTitle.value = data.title || "";

    var metaOut = document.getElementById("meta-output-filename");
    if (metaOut && data.outputVideo) metaOut.value = data.outputVideo;

    renderTimeline(data.scenes || []);
    renderScriptEditor(data.scenes || []);
    extractAndRenderMediaSlots(data.scenes || []);
    renderTimingPanel(data.scenes || []);
    updatePreview();

    var tl = document.getElementById("timeline-section");
    if (tl) tl.style.display = "block";
    var tt = document.getElementById("tool-tabs");
    if (tt) tt.style.display = "flex";

    if (btn) btn.textContent = "Parse & Render";
    closeModal("modal-json");

    showAlertBanner("Successfully loaded " + state.sceneCount + " scenes!", "success");
    showToast("Editor generated!");

    if (textarea) textarea.value = JSON.stringify(data, null, 2);
  } catch (err) {
    if (btn) btn.textContent = "Parse & Render";
    showAlertBanner("Invalid JSON structure: " + err.message, "error");
  }
};

/* ===== TIMELINE RENDERING ===== */

function renderTimeline(scenes) {
  var scroll = document.getElementById("timeline-scroll");
  var totalEl = document.getElementById("timeline-total");
  if (!scroll) return;
  scroll.innerHTML = "";

  var totalEst = 0;

  for (var i = 0; i < scenes.length; i++) {
    var scene = scenes[i];
    var card = document.createElement("div");
    card.className = "timeline-card" + (i === state.selectedSceneIndex ? " active" : "");
    card.setAttribute("data-index", i);

    var charCount = (scene.narration || "").length;
    var estSec = Math.max(2, Math.round(charCount * 0.12));
    totalEst += estSec;

    var slotData = scene.image ? state.imageSlots.get(scene.image) : null;
    var hasPreview = slotData && slotData.base64;

    if (hasPreview) {
      card.innerHTML = '<img src="' + slotData.base64 + '" alt="">' +
        '<div class="timeline-label-num">S' + (i + 1) + '</div>';
    } else {
      card.innerHTML = '<div class="timeline-card-empty">' + getSceneLabelAbbr(scene.type) + '</div>' +
        '<div class="timeline-label-num">S' + (i + 1) + '</div>';
    }

    card.addEventListener("click", (function(idx) {
      return function() { selectScene(idx); };
    })(i));

    scroll.appendChild(card);
  }

  if (totalEl) totalEl.textContent = totalEst.toFixed(1) + "s (" + scenes.length + " scenes)";
}

function getSceneLabelAbbr(type) {
  if (!type) return "SC";
  if (type === "hook") return "HK";
  if (type === "intro") return "IN";
  if (type === "feature") return "FT";
  if (type === "cta") return "CT";
  if (type === "ending") return "ED";
  return "SC";
}

/* ===== SCENE PREVIEW CONTROLLER (タグ露出バグの完全修正) ===== */

window.selectScene = function(index) {
  if (!state.configData || !state.configData.scenes) return;
  if (index < 0) index = state.sceneCount - 1;
  if (index >= state.sceneCount) index = 0;
  state.selectedSceneIndex = index;

  var cards = document.querySelectorAll(".timeline-card");
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.toggle("active", i === index);
  }

  if (cards[index]) {
    cards[index].scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
  }

  var scriptCards = document.querySelectorAll(".script-editor-card");
  for (var j = 0; j < scriptCards.length; j++) {
    scriptCards[j].classList.toggle("selected", j === index);
  }
  if (scriptCards[index]) {
    scriptCards[index].scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  updatePreview();
};

window.navigateScene = function(delta) {
  selectScene(state.selectedSceneIndex + delta);
};

function updatePreview() {
  if (!state.configData || !state.configData.scenes) return;
  var scene = state.configData.scenes[state.selectedSceneIndex];
  if (!scene) return;

  var imgEl = document.getElementById("preview-image");
  var emptyEl = document.getElementById("preview-empty");
  var overlayEl = document.getElementById("preview-overlay");
  var sceneNumEl = document.getElementById("preview-scene-num");
  var durEl = document.getElementById("preview-duration");
  var navEl = document.getElementById("preview-nav");

  var slotData = scene.image ? state.imageSlots.get(scene.image) : null;
  if (slotData && slotData.base64) {
    if (imgEl) { imgEl.src = slotData.base64; imgEl.style.display = "block"; }
    if (emptyEl) emptyEl.style.display = "none";
  } else {
    if (imgEl) imgEl.style.display = "none";
    if (emptyEl) {
      emptyEl.style.display = "flex";
      emptyEl.innerHTML = '<span class="emoji">&#127916;</span>' +
        '<div style="font-weight:800; font-size: 15px; margin-top:8px;">' + escapeHtml(scene.title || "Scene " + (state.selectedSceneIndex + 1)).replace(/&lt;br\s*\/?&gt;/gi, " ").replace(/<br\s*\/?>/gi, " ") + '</div>';
    }
  }

  if (overlayEl) {
    overlayEl.style.display = "flex";
    
    // HTMLエスケープ後に、<br /> や <br> を実際の改行タグに戻してテキスト被り・生タグ露出を解決
    var cleanTitle = escapeHtml(scene.title || "")
      .replace(/&lt;br\s*\/?&gt;/gi, "<br>")
      .replace(/&lt;br&gt;/gi, "<br>");
      
    var cleanSub = escapeHtml(scene.subtitle || scene.narration || "");

    overlayEl.innerHTML = '<div class="preview-title">' + cleanTitle + '</div>' +
      '<div class="preview-subtitle">' + cleanSub + '</div>';
  }

  if (sceneNumEl) {
    sceneNumEl.style.display = "block";
    sceneNumEl.textContent = "Scene " + (state.selectedSceneIndex + 1) + "/" + state.sceneCount;
  }

  if (durEl) {
    durEl.style.display = "block";
    var charCount = (scene.narration || "").length;
    var estSec = Math.max(2, Math.round(charCount * 0.12));
    durEl.textContent = estSec + "s";
  }

  if (navEl) navEl.style.display = "flex";
}

/* ===== SCRIPT EDITOR PANEL ===== */

function renderScriptEditor(scenes) {
  var container = document.getElementById("script-editor-list");
  if (!container) return;
  container.innerHTML = "";

  for (var i = 0; i < scenes.length; i++) {
    (function(scene, index) {
      var card = document.createElement("div");
      card.className = "script-editor-card" + (index === state.selectedSceneIndex ? " selected" : "");
      card.setAttribute("data-scene-index", index);

      var html = '<div class="script-card-header">' +
        '<span class="scene-num-badge">Scene ' + (index + 1) + '</span>' +
        '<span class="scene-type-badge">' + escapeHtml(scene.type || "standard") + '</span>' +
        '</div>';

      html += '<div class="input-group">' +
        '<label>Title</label>' +
        '<input type="text" class="scene-title-input" value="' + escapeHtml(scene.title || "") + '" oninput="onSceneFieldChange(' + index + ', \'title\', this.value)">' +
        '</div>';

      if (scene.subtitle !== undefined) {
        html += '<div class="input-group">' +
          '<label>Subtitle</label>' +
          '<input type="text" class="scene-sub-input" value="' + escapeHtml(scene.subtitle || "") + '" oninput="onSceneFieldChange(' + index + ', \'subtitle\', this.value)">' +
          '</div>';
      }

      html += '<div class="input-group" style="margin-bottom:0;">' +
        '<label style="color:var(--accent);">Narration Script</label>' +
        '<textarea class="scene-nar-input" style="min-height:56px;" oninput="onSceneFieldChange(' + index + ', \'narration\', this.value)">' + escapeHtml(scene.narration || "") + '</textarea>' +
        '</div>';

      card.innerHTML = html;
      card.addEventListener("click", function() { selectScene(index); });
      container.appendChild(card);
    })(scenes[i], i);
  }
}

window.onSceneFieldChange = function(index, field, value) {
  if (!state.configData || !state.configData.scenes) return;
  state.configData.scenes[index][field] = value;
  syncJsonTextarea();
  if (index === state.selectedSceneIndex) updatePreview();
  if (field === "narration") {
    renderTimingPanel(state.configData.scenes);
    var totalEl = document.getElementById("timeline-total");
    if (totalEl) {
      var totalEst = 0;
      for (var i = 0; i < state.configData.scenes.length; i++) {
        var charCount = (state.configData.scenes[i].narration || "").length;
        totalEst += Math.max(2, Math.round(charCount * 0.12));
      }
      totalEl.textContent = totalEst.toFixed(1) + "s (" + state.sceneCount + " scenes)";
    }
  }
};

window.syncJsonTextarea = function() {
  if (!state.configData) return;
  var metaTitle = document.getElementById("meta-title");
  if (metaTitle) state.configData.title = metaTitle.value;
  var textarea = document.getElementById("textarea-json-raw");
  if (textarea) textarea.value = JSON.stringify(state.configData, null, 2);
};

/* ===== MEDIA SLOTS (標準ボタンの隠蔽とカードタップ挙動) ===== */

function extractAndRenderMediaSlots(scenes) {
  state.imageSlots.clear();

  for (var i = 0; i < scenes.length; i++) {
    var scene = scenes[i];
    if (scene.image) {
      if (!state.imageSlots.has(scene.image)) {
        state.imageSlots.set(scene.image, { scenes: [i + 1], base64: null });
      } else {
        state.imageSlots.get(scene.image).scenes.push(i + 1);
      }
    }
  }

  var container = document.getElementById("media-slot-grid");
  if (!container) return;
  container.innerHTML = "";

  if (state.imageSlots.size === 0) {
    container.innerHTML = '<p class="placeholder-text">No media slots required for this JSON.</p>';
    return;
  }

  state.imageSlots.forEach(function(slotData, filename) {
    var slot = document.createElement("div");
    slot.className = "media-slot-item";
    var safeFilename = escapeHtml(filename);
    var sceneList = slotData.scenes.map(function(n) { return "Scene " + n; }).join(", ");

    // 標準の <input type="file"> は非表示にして、カード全体のクリックで発火させる
    slot.innerHTML = '<div class="media-slot-view" onclick="triggerFileInput(\'' + safeFilename + '\')">' +
      '<div class="icon-camera">&#128247;</div>' +
      '<span class="media-slot-placeholder-text">Tap to select photo</span>' +
      '<input type="file" id="file-input-' + safeFilename.replace(/[^a-zA-Z0-9]/g, "_") + '" accept="image/*" style="display:none;" onchange="handleSlotImageSelect(event, \'' + safeFilename + '\')">' +
      '</div>' +
      '<div class="media-slot-details">' +
      '<div class="media-slot-title">' + safeFilename + '</div>' +
      '<div class="media-slot-scenes-list">' + sceneList + '</div>' +
      '</div>';

    container.appendChild(slot);
  });
}

window.triggerFileInput = function(filename) {
  var id = "file-input-" + filename.replace(/[^a-zA-Z0-9]/g, "_");
  var input = document.getElementById(id);
  if (input) input.click();
};

window.handleSlotImageSelect = function(event, slotFilename) {
  var file = event.target.files[0];
  if (!file) return;
  var slotEl = event.target.closest(".media-slot-item");
  processImageFile(file, slotFilename, slotEl);
};

function processImageFile(file, slotFilename, slotElement) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var MAX_SIZE = 1200;
      var w = img.width, h = img.height;
      if (w > MAX_SIZE || h > MAX_SIZE) {
        if (w > h) { h = Math.round((h * MAX_SIZE) / w); w = MAX_SIZE; }
        else { w = Math.round((w * MAX_SIZE) / h); h = MAX_SIZE; }
      }
      var canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      var base64Data = canvas.toDataURL("image/jpeg", 0.85);

      var slot = state.imageSlots.get(slotFilename);
      if (slot) slot.base64 = base64Data;

      if (slotElement) {
        var view = slotElement.querySelector(".media-slot-view");
        if (view) {
          var safeFilename = escapeHtml(slotFilename);
          view.innerHTML = '<img src="' + base64Data + '" alt="preview">' +
            '<div class="media-slot-checked">&#10003;</div>' +
            '<input type="file" id="file-input-' + safeFilename.replace(/[^a-zA-Z0-9]/g, "_") + '" accept="image/*" style="display:none;" onchange="handleSlotImageSelect(event, \'' + safeFilename + '\')">';
        }
      }

      if (state.configData) {
        renderTimeline(state.configData.scenes || []);
        updatePreview();
      }

      showToast("Uploaded successfully!");
    };
    img.onerror = function() { showAlertBanner("Failed to load image file.", "error"); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ===== TIMING PANEL ===== */

function renderTimingPanel(scenes) {
  var container = document.getElementById("timing-editor-list");
  if (!container) return;
  container.innerHTML = "";

  var totalEst = 0;

  for (var i = 0; i < scenes.length; i++) {
    var scene = scenes[i];
    var charCount = (scene.narration || "").length;
    var estSec = Math.max(2, Math.round(charCount * 0.12));
    totalEst += estSec;

    var card = document.createElement("div");
    card.className = "timing-item-card";
    card.innerHTML = '<div class="timing-name">' +
      'Scene ' + (i + 1) + '<span>' + escapeHtml(scene.type || "std") + '</span>' +
      '</div>' +
      '<div class="timing-sec">~' + estSec + 's</div>';
    container.appendChild(card);
  }

  var summary = document.createElement("div");
  summary.className = "timing-item-card total";
  summary.innerHTML = '<div class="timing-name">' +
    'Total Video Duration<span>' + scenes.length + ' scenes</span>' +
    '</div>' +
    '<div class="timing-sec">~' + totalEst + 's</div>';
  container.appendChild(summary);
}

/* ===== PUSH AND VIDEO ACTIONS TRIGGER ===== */

window.pushAndTriggerWorkflow = async function() {
  if (!state.configData) {
    showAlertBanner("Please load JSON first.", "error");
    openModal("modal-json");
    return;
  }

  var missingSlots = [];
  state.imageSlots.forEach(function(slot, filename) {
    if (!slot.base64) missingSlots.push(filename);
  });

  if (missingSlots.length > 0) {
    var confirmMsg = "The following images are not assigned:\n\n" + missingSlots.join("\n") + "\n\nContinue anyway?";
    if (!confirm(confirmMsg)) return;
  }

  var pushBtn = document.getElementById("btn-push-trigger");
  if (pushBtn) {
    pushBtn.disabled = true;
    var labelEl = pushBtn.querySelector(".btn-label");
    if (labelEl) labelEl.textContent = "Processing...";
  }
  showAlertBanner("Uploading files to GitHub...", "info");

  try {
    syncJsonTextarea();
    var updatedJsonText = document.getElementById("textarea-json-raw").value;

    var payload = {
      action: "pushAndTrigger",
      jsonFilename: document.getElementById("meta-json-filename") ? document.getElementById("meta-json-filename").value : "video_config_custom.json",
      outputFilename: document.getElementById("meta-output-filename") ? document.getElementById("meta-output-filename").value : "output_custom.mp4",
      jsonContent: updatedJsonText,
      images: []
    };

    state.imageSlots.forEach(function(slot, filename) {
      if (slot.base64) {
        var b64 = slot.base64;
        if (b64.indexOf(",") !== -1) b64 = b64.split(",")[1];
        payload.images.push({ path: filename, filename: filename, base64: b64 });
      }
    });

    var res = await fetch(state.gasUrl, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "payload=" + encodeURIComponent(JSON.stringify(payload))
    });

    var result = await res.json();
    if (result.status === "ok" || result.success === true || result.workflowTriggered === true) {
      showAlertBanner("Files uploaded! Actions triggered successfully.", "success");
      if (pushBtn) {
        var labelEl2 = pushBtn.querySelector(".btn-label");
        if (labelEl2) labelEl2.textContent = "Success";
      }
      switchToolTab("panel-status", null);
      setTimeout(function() {
        window.checkActionsStatus(true);
        startPollingActions();
      }, 3000);
    } else {
      var errMsg = result.error || result.message || "Server error";
      if (result.errors && result.errors.length > 0) errMsg += " (" + result.errors.join(", ") + ")";
      throw new Error(errMsg);
    }
  } catch (err) {
    showAlertBanner("Upload failed: " + err.message, "error");
    if (pushBtn) {
      pushBtn.disabled = false;
      var labelEl3 = pushBtn.querySelector(".btn-label");
      if (labelEl3) labelEl3.textContent = "Generate";
    }
  }
};

/* ===== ACTIONS STATUS POLING ===== */

function startPollingActions() {
  if (state.pollingInterval) clearInterval(state.pollingInterval);
  state.pollingInterval = setInterval(function() {
    window.checkActionsStatus(false);
  }, 4000);
}

window.checkActionsStatus = async function(showToastOnManual) {
  if (showToastOnManual) showAlertBanner("Loading execution logs from GitHub...", "info");

  try {
    var res = await fetch(state.gasUrl + "?action=status");
    var data = await res.json();

    if (data.status !== "ok" && data.success !== true) {
      throw new Error(data.error || data.message || "Status endpoint failed");
    }

    var latest = data.latestRun;
    var badge = document.getElementById("status-badge");
    var title = document.getElementById("status-title");
    var meta = document.getElementById("status-meta");
    var artArea = document.getElementById("artifact-list-area");

    if (!latest) {
      if (badge) { badge.textContent = "STANDBY"; badge.className = "status-badge"; }
      if (title) title.textContent = "No history found";
      if (meta) meta.textContent = "Workflow runs haven't started yet.";
      return;
    }

    var createdTime = latest.created_at || latest.updated_at || new Date().toISOString();
    var timeStr = new Date(createdTime).toLocaleTimeString();
    var runNum = latest.run_number || latest.id || "?";
    
    if (meta) meta.textContent = "Updated: " + timeStr + " (Run #" + runNum + ")";

    if (latest.status === "in_progress" || latest.status === "queued") {
      if (badge) { badge.textContent = "RENDERING"; badge.className = "status-badge progress"; }
      if (title) title.textContent = "Generating video and synthetic voice...";
    } else if (latest.status === "completed" && latest.conclusion === "success") {
      if (badge) { badge.textContent = "SUCCESS"; badge.className = "status-badge success"; }
      if (title) title.textContent = "Video successfully generated!";
      if (state.pollingInterval) clearInterval(state.pollingInterval);
    } else if (latest.status === "completed" && latest.conclusion === "failure") {
      if (badge) { badge.textContent = "FAILED"; badge.className = "status-badge error"; }
      if (title) title.textContent = "Video generation failed. Please check build logs.";
      if (state.pollingInterval) clearInterval(state.pollingInterval);
    } else {
      if (badge) { badge.textContent = latest.status.toUpperCase(); badge.className = "status-badge"; }
      if (title) title.textContent = "Workflow status: " + latest.status;
    }

    if (artArea) artArea.innerHTML = "";
    if (latest.artifacts && latest.artifacts.length > 0 && artArea) {
      for (var i = 0; i < latest.artifacts.length; i++) {
        var art = latest.artifacts[i];
        var sizeMb = (art.size_in_bytes / (1024 * 1024)).toFixed(1);
        var a = document.createElement("a");
        a.className = "artifact-item";
        a.href = latest.html_url;
        a.target = "_blank";
        a.innerHTML = "<span>" + escapeHtml(art.name) + " (" + sizeMb + " MB)</span><span>Download</span>";
        artArea.appendChild(a);
      }
    } else if (latest.status === "completed" && latest.conclusion === "success" && artArea) {
      var link = document.createElement("a");
      link.className = "artifact-item";
      link.href = latest.html_url;
      link.target = "_blank";
      link.innerHTML = "<span>Output Video File</span><span>Go to Run Page</span>";
      artArea.appendChild(link);
    }

    if (showToastOnManual) {
      showToast("Status updated");
      showAlertBanner("Status is up to date.", "success");
    }
  } catch (err) {
    if (showToastOnManual) showAlertBanner("Failed to retrieve status: " + err.message, "error");
  }
};
